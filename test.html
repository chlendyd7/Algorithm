<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block vs Inline vs Inline-block</title>
<style>
  .container {
    margin: 20px;
    border: 1px solid #333;
    padding: 10px;
  }

  .box {
    border: 2px solid #007BFF;
    background-color: #CCE5FF;
    padding: 10px;
    margin: 5px;
    text-align: center;
  }

  .block {
    display: block;
    width: 150px;
    height: 50px;
  }

  .inline {
    display: inline;
    padding: 10px;
  }

  .inline-block {
    display: inline-block;
    width: 150px;
    height: 50px;
    padding: 100px;
  }
</style>
</head>
<body>

<h2>Block 요소</h2>
<div class="container">
  <div class="box block">Block 1</div>
  <div class="box block">Block 2</div>
  <div class="box block">Block 3</div>
</div>

<h2>Inline 요소</h2>
<div class="container">
  <span class="box inline">Inline 1</span>
  <span class="box inline">Inline 2</span>
  <span class="box inline">Inline 3</span>
</div>

<h2>Inline-block 요소</h2>
<div class="container">
  <div class="box inline-block">Inline-block 1</div>
  <div class="box inline-block">Inline-block 2</div>
  <div class="box inline-block">Inline-block 3</div>
</div>

</body>
</html>
